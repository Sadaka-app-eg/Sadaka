<!-- قسم ادعُ لهم بظهر الغيب -->
<div class="pray-container" style="direction: rtl; font-family: 'Amiri', serif; padding: 10px;">
  
  <!-- عبارة تشجيعية متغيرة علوية -->
  <div class="comm-card" style="text-align: center; border-right: 4px solid var(--gold); background: var(--card);">
    <p id="prayEncouragementTxt" style="color: var(--gold); font-size: 16px; font-weight: bold; line-height: 1.8;">
      🕊️ «مَا مِنْ عَبْدٍ مُسْلِمٍ يَدْعُو لأَخِيهِ بِظَهْرِ الْغَيْبِ، إِلاَّ قَالَ الْمَلَكُ: وَلَكَ بِمِثْلٍ»
    </p>
  </div>

  <!-- فورم إضافة شخص جديد -->
  <div class="comm-card" style="margin-top: 15px;">
    <div style="font-size: 15px; color: var(--gold); font-weight: bold; margin-bottom: 12px;">➕ أضف حبيباً لتخصيص دعاء له:</div>
    
    <div style="margin-bottom: 12px;">
      <input id="prayPersonName" type="text" placeholder="اكتب اسم الشخص هنا (مثال: أبي، والدتي، أخي أحمد)..." style="width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: var(--text); border-radius: 8px; outline: none; font-family: 'Amiri', serif; font-size: 15px;" />
    </div>

    <div style="margin-bottom: 15px;">
      <label style="color: var(--text2); display: block; margin-bottom: 6px; font-size: 13px;">جنس الشخص (لتعديل صيغة الدعاء تلقائياً):</label>
      <div style="display: flex; gap: 10px;">
        <button onclick="window.setPrayGender('male')" id="btnPrayMale" class="comm-tab-btn" style="border: 1px solid var(--border); border-radius: 8px; padding: 10px;">🧔 ذكر</button>
        <button onclick="window.setPrayGender('female')" id="btnPrayFemale" class="comm-tab-btn" style="border: 1px solid var(--border); border-radius: 8px; padding: 10px;">🧕 أنثى</button>
      </div>
    </div>

    <button onclick="window.addNewPrayPerson()" style="width: 100%; background: var(--gold); color: #111; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px;">✨ حفظ وإدراج في سجل الدعاء</button>
  </div>

  <!-- قائمة الأشخاص المضافين والأدعية المخصصة لهم -->
  <div style="font-size: 15px; color: var(--gold); margin: 20px 0 10px; font-weight: bold; border-right: 3px solid var(--gold); padding-right: 8px;">📖 قائمة أحبابك الذين تدعو لهم:</div>
  <div id="prayPersonsList"></div>

</div>
